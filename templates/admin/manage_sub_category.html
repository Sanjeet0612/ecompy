                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>

                                    <div class="modal-body">
                                        <div class="row g-3">

                                            <!-- Category -->
                                            <div class="col-md-6">
                                                <label class="form-label">Select Category</label>
                                                <select class="form-select" name="category_id" id="editCategoryId" required>
                                                    <option value="">Select Category</option>

                                            </div>

                                            <!-- Sub Category Name -->
                                            <div class="col-md-6">
                                                <label class="form-label">Sub Category Name</label>

                                            <!-- Slug -->
                                            <div class="col-md-6">

{% include "admin/layout/footer.html" %}

<script>
let currentPage = 1;
let currentLimit = 10;
let currentSearch = "";
let currentStatus = "";
const rowsPerPageOptions = [5, 10, 15, 20, 50, 100];

/* Loading SubCategory List*/
$(document).ready(function () {
    loadSubCategories();
    renderRowsPerPageSelect();
});

/* Adding SubCategory Data */
$(document).ready(function () {

    $("#addSubCategoryForm").on("submit", function (e) {
        e.preventDefault();

        let form = $("#addSubCategoryForm")[0];
        let formData = new FormData(form);

        $.ajax({
            url: "/admin/subcategories/subcategory/create",
            type: "POST",
            data: formData,
            processData: false,
            contentType: false,

            beforeSend: function () {
                $(".btn-primary").text("Saving...").prop("disabled", true);
            },

            success: function (res) {

                if (res.status === true || res.success === true) {

                    Swal.fire({
                        icon: "success",
                        title: "Success",
                        text: res.message || "Sub Category created successfully",
                        timer: 2000,
                        showConfirmButton: false
                    });

                    $("#addSubCategoryForm")[0].reset();
                    $("#addSubCategoryModal").modal("hide");

                    loadSubCategories();

                } else {

                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: res.message || "Something went wrong"
                    });
                }
            },

            error: function (xhr) {

                Swal.fire({
                    icon: "error",
                    title: "Server Error",
                    text: "Please try again later"
                });

                console.log(xhr.responseText);
            },

            complete: function () {
                $(".btn-primary").text("Add Sub Category").prop("disabled", false);
            }
        });

    });

});

/* Edit Subcategory Section */

$(document).on("click", ".edit-subcategory", function (e) {

    e.preventDefault();

    let id = $(this).data("id");

    $.ajax({
        url: "/admin/subcategories/subcategory/" + id,
        type: "GET",

        success: function (res) {

            if (res.status) {

                let item = res.data;

                // Hidden ID
                $("#editSubCategoryId").val(item.id);

                // Category selected hoga
                $("#editCategoryId").val(item.category_id);

                // Name
                $("#editSubCategoryName").val(item.name);

                // Slug
                $("#editSubCategorySlug").val(item.slug);

                // Status
                $("#editSubCategoryStatus").val(item.status);

                // Image Preview
                if (item.image) {
                    $("#editImagePreview")
                        .attr("src", item.image)
                        .removeClass("d-none");
                } else {
                    $("#editImagePreview").addClass("d-none");
                }

            }

        }

    });

});

/* Loading Category List */
$(document).ready(function () {

    loadCategories();

    function loadCategories() {

        $.ajax({
            url: "/admin/categories/category/list",   // 👈 API endpoint
            type: "GET",

            success: function (res) {

                if (res.status === true || res.success === true) {

                    let options = `<option value="">Select Category</option>`;

                    res.data.forEach(function (cat) {
                        options += `<option value="${cat.id}">${cat.name}</option>`;
                    });

                    $("#categoryId").html(options); // Add Modal
                    $("#editCategoryId").html(options);   // Edit Modal
                }
            },

            error: function (err) {
                console.log(err);
            }

        });

    }

});

/* Filter Section*/
let searchTimer;

$(document).on("keyup", "[data-table-search]", function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function () {
        currentSearch = $("[data-table-search]").val().trim();
        currentPage = 1;
        loadSubCategories();
    }, 400);

});

$(document).on("change", "[data-table-filter='status']", function () {
    currentStatus = $(this).val();
    currentPage = 1;
    loadSubCategories();
});

$(document).on("change", "[data-table-set-rows-per-page]", function () {
    currentLimit = parseInt($(this).val());
    currentPage = 1;
    loadSubCategories();
});

/* Delete Section */
$(document).on("change", "[data-table-select-all]", function () {

    $(".row-check").prop("checked", $(this).prop("checked"));

    toggleBulkDeleteButton();
});

$(document).on("change", ".row-check", function () {

    let total = $(".row-check").length;
    let checked = $(".row-check:checked").length;

    $("[data-table-select-all]").prop("checked", total === checked);

    toggleBulkDeleteButton();
});

function toggleBulkDeleteButton() {

    let count = $(".row-check:checked").length;

    if (count > 0) {
        $("[data-table-delete-selected]").removeClass("d-none");
    } else {
        $("[data-table-delete-selected]").addClass("d-none");
    }
}

$(document).on("click", "[data-table-delete-selected]", function () {

    let ids = [];

    $(".row-check:checked").each(function () {
        ids.push($(this).val());
    });

    if (ids.length === 0) return;

    Swal.fire({
        title: "Are you sure?",
        text: "Selected items will be deleted!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Yes, delete it!"
    }).then((result) => {

        if (result.isConfirmed) {

            $.ajax({
                url: "/admin/subcategories/subcategory/bulk-delete",
                type: "POST",
                data: { ids: ids },

                // ⭐ IMPORTANT FIX
                traditional: true,

                success: function (res) {

                    Swal.fire({
                        icon: "success",
                        title: "Deleted",
                        text: res.message || "Deleted successfully",
                        timer: 1500,
                        showConfirmButton: false
                    });

                    // IMPORTANT RESET
                    $("[data-table-select-all]").prop("checked", false);
                    $("[data-table-delete-selected]").addClass("d-none");

                    loadSubCategories();
                }
            });
        }
    });

});

/* Global loading Subcategory Function */
function loadSubCategories(){

        $("table tbody").html(`
            <tr>
                <td colspan="7" class="text-center py-3">Loading...</td>
            </tr>
        `);

        $.ajax({
            url: "/admin/subcategories/subcategory/list",
            type: "GET",
            data: {
                page: currentPage || 1,
                limit: currentLimit || 10,
                search: currentSearch || "",
                status: currentStatus || ""
            },

            success: function(res){

                let rows = "";

                if(res.status && res.data.length > 0){

                    res.data.forEach(function(item){

                        let statusBadge = item.status == 1
                            ? `<span class="badge badge-soft-success fs-xxs">Active</span>`
                            : `<span class="badge badge-soft-danger fs-xxs">Inactive</span>`;

                        let createdAt = "";
                        let time = "";

                        if(item.updated_at){
                            let dt = new Date(item.updated_at);

                            createdAt = dt.toLocaleDateString('en-US', {
                                day: '2-digit',
                                month: 'short',
                                year: 'numeric'
                            });

                            time = dt.toLocaleTimeString([], {
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                        }

                        let image = item.image
                            ? item.image
                            : "assets/images/products/1.png";

                        rows += `
                            <tr>

                                <td>
                                    <input class="form-check-input row-check"
                                        type="checkbox" value="${item.id}">
                                </td>

                                <td>${item.category_name}</td>

                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <img src="${image}" class="rounded" width="40" height="40">
                                        <span>${item.name}</span>
                                    </div>
                                </td>

                                <td>${item.slug}</td>

                                <td>
                                    ${createdAt}
                                    <small class="text-muted d-block">${time}</small>
                                </td>

                                <td>
                                    ${statusBadge}
                                </td>

                                <td>
                                    <div class="d-flex justify-content-center gap-1">

                                        <a href="#"
                                           class="btn btn-default btn-icon btn-sm rounded-circle view-subcategory"
                                           data-id="${item.id}"
                                           data-bs-toggle="modal"
                                           data-bs-target="#viewSubCategoryModal">
                                            <i data-lucide="eye"></i>
                                        </a>

                                        <a href="#"
                                           class="btn btn-default btn-icon btn-sm rounded-circle edit-subcategory"
                                           data-id="${item.id}"
                                           data-bs-toggle="modal"
                                           data-bs-target="#editSubCategoryModal">
                                            <i data-lucide="square-pen"></i>
                                        </a>

                                        <a href="#"
                                           class="btn btn-default btn-icon btn-sm rounded-circle delete-subcategory"
                                           data-id="${item.id}">
                                            <i data-lucide="trash-2"></i>
                                        </a>

                                    </div>
                                </td>

                            </tr>
                        `;
                    });

                    $("table tbody").html(rows);

                    if(typeof lucide !== "undefined"){
                        lucide.createIcons();
                    }

                    renderPagination(res.total, res.page, res.limit);

                } else {

                    $("table tbody").html(`
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4">
                                No subcategories found
                            </td>
                        </tr>
                    `);

                    $(".pagination-area").html("");
                }
            },

            error: function(){

                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: "Failed to load subcategories"
                });

            }
        });
    }

function renderPagination(total, page, limit){

    let pages = Math.ceil(total / limit);
    let html = "";

    if(pages <= 1){
        $(".pagination-area").html("");
        return;
    }

    html += `<nav><ul class="pagination justify-content-end">`;

    for(let i = 1; i <= pages; i++){

        html += `
            <li class="page-item ${i == page ? 'active' : ''}">
                <a href="#" class="page-link pagination-btn" data-page="${i}">
                    ${i}
                </a>
            </li>
        `;
    }

    html += `</ul></nav>`;

    $(".pagination-area").html(html);
}

function renderRowsPerPageSelect(){
    let html = "";
    rowsPerPageOptions.forEach(val => {

        html += `
            <option value="${val}" ${val == currentLimit ? 'selected' : ''}>
                ${val}
            </option>
        `;
    });
    $("[data-table-set-rows-per-page]").html(html);
}

/* Edit Update Section start */
$(document).on("click", ".edit-subcategory", function (e) {

    e.preventDefault();

    let id = $(this).data("id");

    $.ajax({

        url: "/admin/subcategories/subcategory/" + id,
        type: "GET",

        success: function (res) {

            if (res.status) {

                let item = res.data;

                $("#editSubCategoryId").val(item.id);
                $("#editCategoryId").val(item.category_id);
                $("#editSubCategoryName").val(item.name);
                $("#editSubCategorySlug").val(item.slug);
                $("#editSubCategoryStatus").val(item.status);

                if (item.image) {

                    $("#editImagePreview")
                        .attr("src", item.image)
                        .removeClass("d-none");

                } else {

                    $("#editImagePreview")
                        .addClass("d-none");

                }

            } else {

                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: "Sub Category not found"
                });

            }

        },

        error: function () {

            Swal.fire({
                icon: "error",
                title: "Error",
                text: "Failed to load sub category"
            });

        }

    });

});


/* Update SubCategory */
$(document).on("submit", "#editSubCategoryForm", function (e) {

    e.preventDefault();

    let form = $("#editSubCategoryForm")[0];
    let formData = new FormData(form);

    $.ajax({
        url: "/admin/subcategories/subcategory/update",
        type: "POST",
        data: formData,
        processData: false,
        contentType: false,

        beforeSend: function () {
            $("#editSubCategoryForm button[type='submit']")
                .text("Updating...")
                .prop("disabled", true);
        },

        success: function (res) {

            if (res.status) {

                Swal.fire({
                    icon: "success",
                    title: "Success",
                    text: res.message,
                    timer: 2000,
                    showConfirmButton: false
                });

                $("#editSubCategoryModal").modal("hide");

                loadSubCategories();

            } else {

                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: res.message
                });

            }

        },

        error: function (xhr) {

            console.log(xhr.responseText);

            Swal.fire({
                icon: "error",
                title: "Error",
                text: "Failed to update sub category"
            });

        },

        complete: function () {

            $("#editSubCategoryForm button[type='submit']")
                .text("Update Sub Category")
                .prop("disabled", false);

        }

    });

});

/* Sub Category Delete By Id */
$(document).on("click", ".delete-subcategory", function (e) {
    e.preventDefault();

    const id = $(this).data("id");

    Swal.fire({
        title: "Are you sure?",
        text: "You won't be able to revert this!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Yes, delete it!"
    }).then((result) => {

        if (!result.isConfirmed) return;

        $.ajax({
            url: `/admin/subcategories/subcategory/delete/${id}`,
            type: "DELETE",
            success: function (res) {

                if (res.status) {

                    Swal.fire({
                        icon: "success",
                        title: "Success",
                        text: res.message,
                        timer: 2000,
                        showConfirmButton: false
                    });

                    loadSubCategories();

                } else {

                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: res.message,
                        timer: 2000,
                        showConfirmButton: false
                    });

                }
            },
            error: function () {
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: "Something went wrong.",
                    timer: 2000,
                    showConfirmButton: false
                });
            }
        });

    });
});
</script>
