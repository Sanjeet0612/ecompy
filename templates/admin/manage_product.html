{% include "/admin/layout/footer.html" %}


<script>

$(document).ready(function () {
    bindFilters();
    loadCategories();
    loadProducts();
});

let currentPage = 1;
let rowsPerPage = 10;
let currentSearch = "";
let currentStatus = "";
let currentCategory = "";
let currentSubCategory = "";

/* Pagination Section Start */

function renderPagination(total, page, limit) {

    let pages = Math.ceil(total / limit);

    let html = "";

    let start = total === 0 ? 0 : ((page - 1) * limit) + 1;
    let end = Math.min(page * limit, total);

    $(".pagination-info").html(
        `Showing <strong>${start}</strong> to <strong>${end}</strong> of <strong>${total}</strong> entries`
    );

    if (pages <= 1) {

        $(".pagination-area").html("");

        return;

    }

    html += `
        <nav>
            <ul class="pagination justify-content-end mb-0">
    `;

    // Previous

    html += `
        <li class="page-item ${page == 1 ? "disabled" : ""}">

            <a
                href="#"
                class="page-link pagination-btn"
                data-page="${page - 1}">

                Previous

            </a>

        </li>
    `;

    // Numbers

    for (let i = 1; i <= pages; i++) {

        html += `
            <li class="page-item ${i == page ? "active" : ""}">

                <a
                    href="#"
                    class="page-link pagination-btn"
                    data-page="${i}">

                    ${i}

                </a>

            </li>
        `;

    }

    // Next

    html += `
        <li class="page-item ${page == pages ? "disabled" : ""}">

            <a
                href="#"
                class="page-link pagination-btn"
                data-page="${page + 1}">

                Next

            </a>

        </li>
    `;

    html += `
            </ul>
        </nav>
    `;

    $(".pagination-area").html(html);

}

$(document).on("click", ".pagination-btn", function (e) {

    e.preventDefault();

    let page = $(this).data("page");

    if ($(this).parent().hasClass("disabled")) {
        return;
    }

    currentPage = page;

    loadProducts();

});

/* Pagination Section End */

function loadProducts() {

    let data = {
        page: currentPage,
        limit: rowsPerPage,
        search: currentSearch,
        status: currentStatus
    };

    if (currentCategory) {
        data.category_id = currentCategory;
    }

    if (currentSubCategory) {
        data.subcategory_id = currentSubCategory;
    }

    $.ajax({

        url: "/admin/product/list",

        type: "GET",

        data: data,

        beforeSend: function () {

            $("#productTableBody").html(`
                <tr>
                    <td colspan="11" class="text-center py-4">
                        Loading products...
                    </td>
                </tr>
            `);

        },

        success: function (res) {


            if (res.status && res.data.length > 0) {
            
                let rows = "";

                res.data.forEach(function(item){

                    let statusBadge = item.status == 1
                        ? `<span class="badge badge-soft-success">Active</span>`
                        : `<span class="badge badge-soft-danger">Inactive</span>`;

                    let approvalBadge = item.approval_status == 1
                        ? `<span class="badge badge-soft-success">Approved</span>`
                        : `<span class="badge badge-soft-warning">Pending</span>`;

                    let featuredBadge = item.is_featured == 1
                        ? `<span class="badge badge-soft-primary">Yes</span>`
                        : `<span class="badge badge-soft-secondary">No</span>`;

                    let image = item.main_image
                        ? "/" + item.main_image
                        : "/assets/images/products/1.png";

                    rows += `

                        <tr>

                            <td class="ps-3">

                                <input
                                    class="form-check-input form-check-input-light fs-14 product-item-check mt-0"
                                    type="checkbox"
                                    value="${item.id}" />

                            </td>

                            <td>

                                <div class="d-flex">

                                    <div class="avatar-md me-3">

                                        <img
                                            src="${item.main_image ? '/' + item.main_image : '/static/uploads/products/main/1.png'}"
                                            class="img-fluid rounded"
                                            alt="${item.name}" />

                                    </div>

                                    <div>

                                        <h5 class="mb-1">

                                            <a
                                                href="/admin/edit-product/${item.id}"
                                                class="link-reset">

                                                ${item.name}

                                            </a>

                                        </h5>

                                        <p class="text-muted mb-0 fs-xxs">

                                            by: ${item.brand || "-"}

                                        </p>

                                    </div>

                                </div>

                            </td>

                            <td>

                                ${item.sku || "-"}

                            </td>

                            <td>

                                ${item.category || "-"}

                            </td>

                            <td>

                                <h5 class="fs-base mb-0 fw-medium">

                                    ${item.stock}

                                </h5>

                            </td>

                            <td>

                                ₹${Number(item.price).toLocaleString()}

                            </td>

                            <td>

                                ${item.orders}

                            </td>

                            <td>

                                ${
                                    item.status == 1
                                    ? '<span class="badge badge-soft-success fs-xxs">Published</span>'
                                    : '<span class="badge badge-soft-danger fs-xxs">Draft</span>'
                                }

                            </td>

                            <td>

                                ${item.updated_at_date}

                                <br>

                                <small class="text-muted">

                                    ${item.updated_at_time}

                                </small>

                            </td>

                            <td>

                                <div class="d-flex justify-content-center gap-1">

                                    <a
                                        href="/admin/product/${item.id}"
                                        class="btn btn-default btn-icon btn-sm rounded-circle">

                                        <i data-lucide="eye" class="fs-lg"></i>

                                    </a>

                                    <a
                                        href="/admin/edit-product/${item.id}"
                                        class="btn btn-default btn-icon btn-sm rounded-circle">

                                        <i data-lucide="square-pen" class="fs-lg"></i>

                                    </a>

                                    <a
                                        href="#"
                                        class="btn btn-default btn-icon btn-sm rounded-circle delete-product"
                                        data-id="${item.id}">

                                        <i data-lucide="trash-2" class="fs-lg"></i>

                                    </a>

                                </div>

                            </td>

                        </tr>

                        `;
                });

                $("#productTableBody").html(rows);

                if(typeof lucide !== "undefined"){
                    lucide.createIcons();
                }

                renderPagination(res.total,res.page,res.limit);
                $("#select-all-products").prop("checked", false);
                toggleBulkDeleteButton();

            }
            else{

                $("#productTableBody").html(`

                    <tr>

                        <td colspan="11"
                            class="text-center text-muted py-4">

                            No Products Found

                        </td>

                    </tr>

                `);

                $(".pagination-area").html("");

            }

        },

        error: function(xhr){

            let message = "Something went wrong.";

            if(xhr.responseJSON && xhr.responseJSON.detail){
                message = xhr.responseJSON.detail;
            }

            $("#productTableBody").html(`

                <tr>

                    <td colspan="11"
                        class="text-center text-danger py-4">

                        Failed to load products.

                    </td>

                </tr>

            `);

            Swal.fire({
                icon:"error",
                title:"Error",
                text:message

            });

        }

    });

}

function loadCategories() {

    $.ajax({

        url: "/admin/categoryDropdown/dropdown",

        type: "GET",

        success: function(res){

            if(!res.status){
                return;
            }

            let html = `
                <option value="">
                    All Categories
                </option>
            `;

            res.data.forEach(function(item){

                html += `
                    <option value="${item.id}">
                        ${item.name}
                    </option>
                `;

            });

            $("#categoryFilter").html(html);

        },

        error:function(){

            Swal.fire({

                icon:"error",

                title:"Error",

                text:"Unable to load categories."

            });

        }

    });

}

function bindFilters() {
    // Search
    $("#searchFilter").on("keyup", function () {
        currentSearch = $(this).val().trim();
        currentPage = 1;
        loadProducts();
    });
    // Category
    $("#categoryFilter").on("change", function () {
        currentCategory = $(this).val();
        currentSubCategory = "";
        currentPage = 1;
        loadSubCategories(currentCategory);
        loadProducts();
    });
    // Sub Category
    $("#subcategoryFilter").on("change", function () {
        currentSubCategory = $(this).val();
        currentPage = 1;
        loadProducts();
    });
    // Status
    $("#statusFilter").on("change", function () {

        currentStatus = $(this).val();

        currentPage = 1;

        loadProducts();

    });
    // Rows
    $("#rowsPerPage").on("change", function () {

        rowsPerPage = $(this).val();

        currentPage = 1;

        loadProducts();

    });
}

function loadSubCategories(categoryId) {

    // Reset Dropdown

    $("#subcategoryFilter").html(`
        <option value="">All Sub Categories</option>
    `);

    if (!categoryId) {
        return;
    }

    $.ajax({

        url: "/admin/subcategoryDropDown/dropdown",

        type: "GET",

        data: {
            category_id: categoryId
        },

        success: function(res){

            if(!res.status){
                return;
            }

            let html = `
                <option value="">All Sub Categories</option>
            `;

            res.data.forEach(function(item){

                html += `
                    <option value="${item.id}">
                        ${item.name}
                    </option>
                `;

            });

            $("#subcategoryFilter").html(html);

        }

    });

}


/* Delete Section Start */

$(document).on("click", ".delete-product", function (e) {

    e.preventDefault();

    let productId = $(this).data("id");

    Swal.fire({
        title: "Delete Product?",
        text: "This product will be moved to trash.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#d33",
        cancelButtonColor: "#6c757d",
        confirmButtonText: "Yes, Delete",
        cancelButtonText: "Cancel"

    }).then((result) => {

        if (!result.isConfirmed) {
            return;
        }

        $.ajax({

            url: "/admin/product/delete/" + productId,
            type: "DELETE",

            success: function (res) {
                if (res.status) {
                    Swal.fire({
                        icon: "success",
                        title: "Success",
                        text: res.message,
                        timer: 2000,
                        showConfirmButton: false
                    });
                    loadProducts();
                } else {
                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: res.message
                    });
                }
            },

            error: function (xhr) {
                let message = "Something went wrong.";
                if (xhr.responseJSON && xhr.responseJSON.message) {
                    message = xhr.responseJSON.message;
                }
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: message
                });
            }
        });
    });
});

$(document).on("change", "#select-all-products", function () {

    $(".product-item-check").prop(
        "checked",
        $(this).prop("checked")
    );

    toggleBulkDeleteButton();

});

$(document).on("change", ".product-item-check", function () {

    $("#select-all-products").prop(

        "checked",

        $(".product-item-check").length === $(".product-item-check:checked").length

    );

    toggleBulkDeleteButton();

});

$(document).on("click", "[data-table-delete-selected]", function () {

    let ids = getSelectedProducts();

    if (ids.length === 0) {
        return;
    }

    Swal.fire({
        title: "Delete Selected Products?",
        text: `You are about to delete ${ids.length} products.`,
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Yes, Delete",
        cancelButtonText: "Cancel"

    }).then((result) => {

        if (!result.isConfirmed) {
            return;
        }

        $.ajax({

            url: "/admin/product/bulk-delete",
            type: "POST",
            contentType: "application/json",

            data: JSON.stringify({
                product_ids: ids
            }),

            success: function (res) {

                if (res.status) {

                    Swal.fire({
                        icon: "success",
                        title: "Success",
                        text: res.message,
                        timer: 2000,
                        showConfirmButton: false
                    });

                    loadProducts();

                } else {

                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: res.message
                    });

                }

            }

        });

    });

});

function getSelectedProducts() {

    let ids = [];

    $(".product-item-check:checked").each(function () {

        ids.push(parseInt($(this).val()));

    });

    return ids;

}

function toggleBulkDeleteButton() {

    let count = $(".product-item-check:checked").length;

    let button = $("[data-table-delete-selected]");

    if (count > 0) {

        button
            .removeClass("d-none")
            .text("Delete (" + count + ")");

    } else {

        button
            .addClass("d-none")
            .text("Delete");

    }

}

</script>
