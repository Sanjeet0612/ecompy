{% include "admin/layout/footer.html" %}

<script>
    /* Brand List loading Section */
    $(document).ready(function () {
        renderRowsPerPageSelect();
        loadBrands();
    });

    /* Create Brand Section */
    $(document).on("submit", "#addBrandForm", function (e) {
    e.preventDefault();

    let formData = new FormData(this);

    $.ajax({
        url: "/admin/brands/brand/create",
        type: "POST",
        data: formData,
        processData: false,
        contentType: false,

        success: function (res) {

            if (res.status) {

                Swal.fire({
                    icon: "success",
                    title: "Success",
                    text: res.message,
                    timer: 2000,
                    showConfirmButton: false
                });

                $("#addBrandModal").modal("hide");
                $("#addBrandForm")[0].reset();

                // Brand List Reload
                loadBrands();

            } else {

                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: res.message,
                    timer: 2000,
                    showConfirmButton: false
                });

            }

        },

        error: function (xhr) {

            Swal.fire({
                icon: "error",
                title: "Error",
                text: xhr.responseJSON?.detail || "Something went wrong.",
                timer: 2000,
                showConfirmButton: false
            });

        }
    });
});

    /* List Brand Section */

    let currentPage = 1;
    let currentSearch = "";
    let currentStatus = "";
    let rowsPerPage = 10;
    const rowsPerPageOptions = [5, 10, 15, 20];

    function loadBrands() {

    $.ajax({
        url: "/admin/brands/brand/list",
        type: "GET",
        data: {
            page: currentPage,
            limit: rowsPerPage,
            search: currentSearch,
            status: currentStatus
        },

        beforeSend: function () {
            $("table tbody").html(`
                <tr>
                    <td colspan="6" class="text-center py-4">
                        Loading...
                    </td>
                </tr>
            `);
        },

        success: function (res) {

            if (res.status && res.data.length > 0) {
                let rows = "";
                res.data.forEach(item => {
                    let statusBadge = item.status == 1
                        ? `<span class="badge badge-soft-success fs-xxs">Active</span>`
                        : `<span class="badge badge-soft-danger fs-xxs">Inactive</span>`;

                    let logo = item.logo
                        ? item.logo
                        : "/assets/images/products/1.png";

                    let updatedAt = "-";
                    let time = "";

                    if (item.updated_at) {
                        let dt = new Date(item.updated_at);
                        updatedAt = dt.toLocaleDateString("en-US", {
                            day: "2-digit",
                            month: "short",
                            year: "numeric"
                        });

                        time = dt.toLocaleTimeString([], {
                            hour: "2-digit",
                            minute: "2-digit"
                        });
                    }

                    rows += `
                        <tr>
                            <td class="ps-3">
                                <input
                                    class="form-check-input product-item-check mt-0"
                                    type="checkbox"
                                    value="${item.id}">
                            </td>

                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-md me-3">
                                        <img src="${logo}"
                                             class="img-fluid rounded"
                                             alt="${item.name}">
                                    </div>
                                    <div>
                                        <h5 class="mb-0">
                                            <a href="#!" class="link-reset">
                                                ${item.name}
                                            </a>
                                        </h5>
                                    </div>
                                </div>
                            </td>

                            <td>${item.slug}</td>
                            <td>
                                ${updatedAt}
                                <br>
                                <small class="text-muted">${time}</small>
                            </td>
                            <td>
                                ${statusBadge}
                            </td>
                            <td>
                                <div class="d-flex justify-content-center gap-1">
                                    <a href="#"
                                       class="btn btn-default btn-icon btn-sm rounded-circle view-brand"
                                       data-id="${item.id}"
                                       data-bs-toggle="modal"
                                       data-bs-target="#viewBrandModal">
                                        <i data-lucide="eye"></i>
                                    </a>
                                    <a href="#"
                                       class="btn btn-default btn-icon btn-sm rounded-circle edit-brand"
                                       data-id="${item.id}"
                                       data-bs-toggle="modal"
                                       data-bs-target="#editBrandModal">
                                        <i data-lucide="square-pen"></i>
                                    </a>
                                    <a href="#"
                                       class="btn btn-default btn-icon btn-sm rounded-circle delete-brand"
                                       data-id="${item.id}">
                                        <i data-lucide="trash-2"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    `;
                });

                $("table tbody").html(rows);
                if (typeof lucide !== "undefined") {
                    lucide.createIcons();
                }
                renderPagination(res.total, res.page, res.limit);

            } else {
                $("table tbody").html(`
                    <tr>
                        <td colspan="6" class="text-center text-muted py-4">
                            No Brand Found
                        </td>
                    </tr>
                `);
                $(".pagination-area").html("");
            }
        },

        error: function (xhr) {
            let message = "Something went wrong.";
            if (xhr.responseJSON && xhr.responseJSON.detail) {
                message = xhr.responseJSON.detail;
            }
            $("table tbody").html(`
                <tr>
                    <td colspan="6" class="text-center text-danger py-4">
                        Failed to load brands.
                    </td>
                </tr>
            `);

            Swal.fire({
                icon: "error",
                title: "Error",
                text: message,
                timer: 2000,
                showConfirmButton: false
            });
        }
    });
}


    /* Pagination Area */

function renderPagination(total, page, limit){

    let pages = Math.ceil(total / limit);
    let html = "";

    if(pages <= 1){
        $(".pagination-area").html("");
        return;
    }

    html += `<nav><ul class="pagination justify-content-end">`;

    for(let i = 1; i <= pages; i++){

        html += `
            <li class="page-item ${i == page ? 'active' : ''}">
                <a href="#" class="page-link pagination-btn" data-page="${i}">
                    ${i}
                </a>
            </li>
        `;
    }

    html += `</ul></nav>`;

    $(".pagination-area").html(html);
}

function renderRowsPerPageSelect(){

    let html = "";

    rowsPerPageOptions.forEach(val => {

        html += `
            <option value="${val}" ${val == rowsPerPage ? "selected" : ""}>
                ${val}
            </option>
        `;

    });

    $("[data-table-set-rows-per-page]").html(html);

}

$(document).on("click", ".pagination-btn", function (e) {

    e.preventDefault();

    currentPage = $(this).data("page");

    loadBrands();

});

$(document).on("change", "[data-table-set-rows-per-page]", function () {

    rowsPerPage = parseInt($(this).val());

    currentPage = 1;

    loadBrands();

});

$(document).on("keyup", "[data-table-search]", function () {

    currentSearch = $(this).val().trim();

    currentPage = 1;

    loadBrands();

});

$(document).on("change", "[data-table-filter='status']", function () {

    currentStatus = $(this).val();

    currentPage = 1;

    loadBrands();

});

/*DELETE*/
let selectedIds = [];
function toggleBulkDeleteButton(){

    let btn = $("[data-table-delete-selected]");

    if(selectedIds.length > 0){
        btn.removeClass("d-none");
        btn.text(`Delete (${selectedIds.length})`);
    } else {
        btn.addClass("d-none");
        btn.text("Delete");
    }
}

$(document).on("change", ".product-item-check", function(){
   
    let id = $(this).val();

    if(!id){
        console.log("Missing ID in checkbox");
        return;
    }

    if($(this).is(":checked")){

        if(!selectedIds.includes(id)){
            selectedIds.push(id);
        }

    } else {

        selectedIds = selectedIds.filter(i => i != id);
    }

    console.log("Selected IDs:", selectedIds);

    toggleBulkDeleteButton();
});

$(document).on("change", "[data-table-select-all]", function(){
    let checked = $(this).is(":checked");
    // reset array
    selectedIds = [];
    $(".product-item-check").each(function(){
        $(this).prop("checked", checked);
        let id = $(this).val();
        if(checked && id){
            selectedIds.push(id);
        }
    });
    console.log("Select All:", selectedIds);
    toggleBulkDeleteButton();
});

$(document).on("click", "[data-table-delete-selected]", function(){

    if(selectedIds.length === 0){
        Swal.fire({
            icon: "warning",
            title: "No selection",
            text: "Please select at least one item"
        });
        return;
    }

    Swal.fire({
        icon: "warning",
        title: "Are you sure?",
        text: `${selectedIds.length} items will be deleted`,
        showCancelButton: true,
        confirmButtonText: "Yes, delete",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if(result.isConfirmed){

            $.ajax({
                url: "/admin/brands/brand/bulk-delete",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    ids: selectedIds
                }),

                success: function(res){

                    if(res.status){

                        Swal.fire({
                            icon: "success",
                            title: "Deleted!",
                            text: res.message,
                            timer: 1500,
                            showConfirmButton: false
                        });

                        //  RESET STATE
                        selectedIds = [];

                        // uncheck all checkboxes
                        $(".product-item-check").prop("checked", false);
                        $("[data-table-select-all]").prop("checked", false);

                        // hide button
                        $("[data-table-delete-selected]").addClass("d-none");
                        $("[data-table-delete-selected]").text("Delete");

                        // reload table
                        loadBrands();
                    }
                },

                error: function(){

                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: "Something went wrong"
                    });

                }
            });
        }
    });

});

/* Single Row Delete */

$(document).on("click", ".delete-brand", function (e) {
    e.preventDefault();

    const id = $(this).data("id");

    Swal.fire({
        icon: "warning",
        title: "Are you sure?",
        text: "This brand will be deleted.",
        showCancelButton: true,
        confirmButtonText: "Yes, Delete",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if (result.isConfirmed) {

            $.ajax({
                url: `/admin/brands/brand/delete/${id}`, // ya jo tumhara route hai
                type: "DELETE",                   // ya POST

                success: function (res) {

                    if (res.status) {

                        Swal.fire({
                            icon: "success",
                            title: "Deleted!",
                            text: res.message,
                            timer: 1500,
                            showConfirmButton: false
                        });

                        loadBrands(); // Table reload
                    }

                },

                error: function () {

                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: "Something went wrong."
                    });

                }

            });

        }

    });

});

/* Edit Attribute Section Start*/

$(document).on("click", ".edit-brand", function (e) {

    e.preventDefault();

    let id = $(this).data("id");

    $.ajax({
        url: `/admin/brands/brand/${id}`,
        type: "GET",

        success: function(res){

            if(res.status){

                $("#editBrandId").val(res.data.id);
                $("#editBrandName").val(res.data.name);
                $("#editBrandSlug").val(res.data.slug);
                $("#editBrandStatus").val(res.data.status);
                $("#editBrandPreview").attr("src", res.data.image);
                // Open Modal
                $("#editBrandModal").modal("show");
            }

        },

        error:function(xhr){

            Swal.fire({
                icon:"error",
                title:"Error",
                text:xhr.responseJSON?.detail || "Something went wrong"
            });

        }

    });

});

/* Update Attribute Section */
$("#editBrandForm").submit(function(e){

    e.preventDefault();

    let id = $("#editBrandId").val();
    let formData = new FormData(this);

    $.ajax({

        url: `/admin/brands/brand/update/${id}`,
        type: "PUT",
        data: formData,
        processData: false,
        contentType: false,

        success:function(res){

            Swal.fire({
                icon:"success",
                title:"Success",
                text:res.message,
                timer:1500,
                showConfirmButton:false
            });

            bootstrap.Modal.getInstance(
                document.getElementById("editBrandModal")
            ).hide();
            loadBrands();
        },

        error:function(xhr){
            Swal.fire({
                icon:"error",
                title:"Error",
                text:xhr.responseJSON?.detail || "Something went wrong"
            });
        }
    });
});

</script>
