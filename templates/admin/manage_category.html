<script>

let currentPage = 1;
let currentLimit = 10;
let currentSearch = "";
let currentStatus = "";
const rowsPerPageOptions = [5, 10, 15, 20, 50, 100];

$(document).ready(function(){
    renderRowsPerPageSelect();
    loadCategories();

    // 🔍 SEARCH (debounce added)
    let searchTimer;

    $(document).on("keyup", "[data-table-search]", function(){

        clearTimeout(searchTimer);

        searchTimer = setTimeout(() => {

            currentSearch = $(this).val();
            currentPage = 1;
            loadCategories();

        }, 400); // 0.4 sec delay
    });


    // 📊 STATUS FILTER
    $(document).on("change", "[data-table-filter='status']", function(){

        currentStatus = $(this).val();
        currentPage = 1;
        loadCategories();
    });


    // 📄 ROWS PER PAGE
    $(document).on("change", "[data-table-set-rows-per-page]", function(){

        currentLimit = $(this).val();
        currentPage = 1;
        loadCategories();
    });


    // 📑 PAGINATION CLICK
    $(document).on("click", ".pagination-btn", function(e){

        e.preventDefault();

        let page = $(this).data("page");

        if(page && page != currentPage){
            currentPage = page;
            loadCategories();
        }
    });

});


function loadCategories(){

    $("table tbody").html(`
        <tr>
            <td colspan="6" class="text-center py-3">Loading...</td>
        </tr>
    `);

    $.ajax({
        url: "/admin/categories/category/list",
        type: "GET",
        data: {
            page: currentPage,
            limit: currentLimit,
            search: currentSearch,
            status: currentStatus
        },

        success: function(res){

            if(res.status && res.data.length > 0){

                let rows = "";

                res.data.forEach(cat => {

                    let statusBadge = cat.status == 1
                        ? `<span class="badge badge-soft-success fs-xxs">Active</span>`
                        : `<span class="badge badge-soft-danger fs-xxs">Inactive</span>`;

                    let image = cat.image
                        ? cat.image
                        : "assets/images/products/1.png";

                    let createdAt = "";
                    let time = "";

                    if(cat.created_at){
                        let dt = new Date(cat.created_at);

                        createdAt = dt.toLocaleDateString('en-US', {
                            day: '2-digit',
                            month: 'short',
                            year: 'numeric'
                        });

                        time = dt.toLocaleTimeString([], {
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                    }

                    rows += `
                        <tr>

                            <td class="ps-3">
                                <input class="form-check-input product-item-check mt-0"
                                    type="checkbox" value="${cat.id}" />
                            </td>

                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-md me-3">
                                        <img src="${image}" class="img-fluid rounded" />
                                    </div>
                                    <div>
                                        <h5 class="mb-0">
                                            <a href="#!" class="link-reset">${cat.name}</a>
                                        </h5>
                                    </div>
                                </div>
                            </td>

                            <td>${cat.slug}</td>
                            <td>${cat.commission_type}</td>
                            <td>${cat.commission_value}</td>

                            <td>${createdAt} <small class="text-muted">${time}</small></td>

                            <td>${statusBadge}</td>

                            <td>
                                <div class="d-flex justify-content-center gap-1">

                                    <a href="#" class="btn btn-default btn-icon btn-sm rounded-circle view-category" data-id="${cat.id}" data-bs-toggle="modal" data-bs-target="#viewCategoryModal">
                                        <i data-lucide="eye"></i>
                                    </a>

                                    <a href="#" class="btn btn-default btn-icon btn-sm rounded-circle edit-category "
                                       data-id="${cat.id}" data-bs-toggle="modal" data-bs-target="#editCategoryModal">
                                        <i data-lucide="square-pen"></i>
                                    </a>

                                    <a href="#" class="btn btn-default btn-icon btn-sm rounded-circle delete-category"
                                       data-id="${cat.id}">
                                        <i data-lucide="trash-2"></i>
                                    </a>

                                </div>
                            </td>

                        </tr>
                    `;
                });

                $("table tbody").html(rows);

                if (typeof lucide !== "undefined") {
                    lucide.createIcons();
                }

                renderPagination(res.total, res.page, res.limit);

            } else {

                $("table tbody").html(`
                    <tr>
                        <td colspan="6" class="text-center text-muted py-4">
                            No categories found
                        </td>
                    </tr>
                `);

                $(".pagination-area").html("");
            }
        },

        error: function(){

            Swal.fire({
                icon: "error",
                title: "Error",
                text: "Failed to load categories"
            });

        }
    });
}

function renderPagination(total, page, limit){

    let pages = Math.ceil(total / limit);
    let html = "";

    if(pages <= 1){
        $(".pagination-area").html("");
        return;
    }

    html += `<nav><ul class="pagination justify-content-end">`;

    for(let i = 1; i <= pages; i++){

        html += `
            <li class="page-item ${i == page ? 'active' : ''}">
                <a href="#" class="page-link pagination-btn" data-page="${i}">
                    ${i}
                </a>
            </li>
        `;
    }

    html += `</ul></nav>`;

    $(".pagination-area").html(html);
}

function renderRowsPerPageSelect(){
    let html = "";
    rowsPerPageOptions.forEach(val => {

        html += `
            <option value="${val}" ${val == currentLimit ? 'selected' : ''}>
                ${val}
            </option>
        `;
    });
    $("[data-table-set-rows-per-page]").html(html);
}

/* Edit Category Section Start*/

$(document).on("click", ".edit-category", function (e) {

    e.preventDefault();

    let id = $(this).data("id");

    $.ajax({
        url: `/admin/categories/category/${id}`,
        type: "GET",

        success: function(res){

            if(res.status){

                $("#editCategoryId").val(res.data.id);
                $("#editCategoryName").val(res.data.name);
                $("#editCategorySlug").val(res.data.slug);
                $("#editCategoryStatus").val(res.data.status);
                $("#editCategoryPreview").attr("src", res.data.image);
                $("#editcommission_type").val(res.data.commission_type);
                $("#editcommission_value").val(res.data.commission_value);

                // Open Modal
                $("#editCategoryModal").modal("show");
            }

        },

        error:function(xhr){

            Swal.fire({
                icon:"error",
                title:"Error",
                text:xhr.responseJSON?.detail || "Something went wrong"
            });

        }

    });

});

/* Update Category Section */
$("#editCategoryForm").submit(function(e){

    e.preventDefault();

    let id = $("#editCategoryId").val();
    let formData = new FormData(this);

    $.ajax({

        url: `/admin/categories/category/update/${id}`,
        type: "PUT",
        data: formData,
        processData: false,
        contentType: false,

        success:function(res){

            Swal.fire({
                icon:"success",
                title:"Success",
                text:res.message,
                timer:1500,
                showConfirmButton:false
            });

            bootstrap.Modal.getInstance(
                document.getElementById("editCategoryModal")
            ).hide();
            loadCategories();
        },

        error:function(xhr){
            Swal.fire({
                icon:"error",
                title:"Error",
                text:xhr.responseJSON?.detail || "Something went wrong"
            });
        }
    });
});

/* View Category Section */
$(document).on("click", ".view-category", function (e) {

    e.preventDefault();

    let id = $(this).data("id");

    $.ajax({
        url: `/admin/categories/category/${id}`,
        type: "GET",

        success: function(res){

            let cat = res.data;

            $("#viewCategoryName").val(cat.name);
            $("#viewCategorySlug").val(cat.slug);
            $("#viewCategoryStatus").val(cat.status == 1 ? "Active" : "Inactive");
            $("#viewCategoryCreatedAt").val(cat.created_at);

            if(cat.image){
                $("#viewCategoryImage").attr("src", cat.image);
            } else {
                $("#viewCategoryImage").attr("src", "/static/images/no-image.png");
            }

        },

        error:function(xhr){

            Swal.fire({
                icon: "error",
                title: "Error",
                text: xhr.responseJSON?.detail || "Something went wrong"
            });

        }
    });

});

</script>

<script>
let selectedIds = [];
/* Add Cetegory Section */
$("#addCategoryForm").submit(function(e){
    e.preventDefault();
    
    let formData = new FormData(this);

    $.ajax({
        url: "/admin/categories/category/create",
        type: "POST",
        data: formData,
        processData: false,
        contentType: false,

        success: function(res){

            if(res.status){

                Swal.fire({
                    icon: "success",
                    title: "Success",
                    text: res.message,
                    timer: 1500,
                    showConfirmButton: false
                });

                $("#addCategoryForm")[0].reset();

                setTimeout(() => {
                    location.reload();
                }, 1500);

            } else {

                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: res.message || "Something went wrong"
                });

            }
        },

        error: function(xhr){

            let msg = "Server Error";

            if(xhr.responseJSON && xhr.responseJSON.detail){
                msg = xhr.responseJSON.detail;
            }

            Swal.fire({
                icon: "error",
                title: "Error",
                text: msg
            });

        }
    });
});

/* Checkbox delete section */
function toggleBulkDeleteButton(){

    let btn = $("[data-table-delete-selected]");

    if(selectedIds.length > 0){
        btn.removeClass("d-none");
        btn.text(`Delete (${selectedIds.length})`);
    } else {
        btn.addClass("d-none");
        btn.text("Delete");
    }
}

$(document).on("change", ".product-item-check", function(){
   
    let id = $(this).val();

    if(!id){
        console.log("Missing ID in checkbox");
        return;
    }

    if($(this).is(":checked")){

        if(!selectedIds.includes(id)){
            selectedIds.push(id);
        }

    } else {

        selectedIds = selectedIds.filter(i => i != id);
    }

    console.log("Selected IDs:", selectedIds);

    toggleBulkDeleteButton();
});

$(document).on("change", "[data-table-select-all]", function(){
    let checked = $(this).is(":checked");
    // reset array
    selectedIds = [];
    $(".product-item-check").each(function(){
        $(this).prop("checked", checked);
        let id = $(this).val();
        if(checked && id){
            selectedIds.push(id);
        }
    });
    console.log("Select All:", selectedIds);
    toggleBulkDeleteButton();
});

$(document).on("click", "[data-table-delete-selected]", function(){

    if(selectedIds.length === 0){
        Swal.fire({
            icon: "warning",
            title: "No selection",
            text: "Please select at least one item"
        });
        return;
    }

    Swal.fire({
        icon: "warning",
        title: "Are you sure?",
        text: `${selectedIds.length} items will be deleted`,
        showCancelButton: true,
        confirmButtonText: "Yes, delete",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if(result.isConfirmed){

            $.ajax({
                url: "/admin/categories/category/bulk-delete",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    ids: selectedIds
                }),

                success: function(res){

                    if(res.status){

                        Swal.fire({
                            icon: "success",
                            title: "Deleted!",
                            text: res.message,
                            timer: 1500,
                            showConfirmButton: false
                        });

                        // 🔥 RESET STATE
                        selectedIds = [];

                        // uncheck all checkboxes
                        $(".product-item-check").prop("checked", false);
                        $("[data-table-select-all]").prop("checked", false);

                        // hide button
                        $("[data-table-delete-selected]").addClass("d-none");
                        $("[data-table-delete-selected]").text("Delete");

                        // reload table
                        loadCategories();
                    }
                },

                error: function(){

                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: "Something went wrong"
                    });

                }
            });
        }
    });

});

$(document).on("click", ".delete-category", function(e){

    e.preventDefault();

    const id = $(this).data("id");

    Swal.fire({
        icon: "warning",
        title: "Are you sure?",
        text: "This category will be deleted.",
        showCancelButton: true,
        confirmButtonText: "Yes, Delete",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if(result.isConfirmed){

            $.ajax({
                url: `/admin/categories/category/delete/${id}`,
                type: "DELETE",

                success: function(res){

                    if(res.status){

                        Swal.fire({
                            icon: "success",
                            title: "Success",
                            text: res.message,
                            timer: 1500,
                            showConfirmButton: false
                        });

                        loadCategories();
                    }

                },

                error: function(xhr){

                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: xhr.responseJSON?.detail || "Something went wrong"
                    });

                }

            });

        }

    });

});

</script>
