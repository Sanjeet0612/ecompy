<script>
    /* Brand List loading Section */
    $(document).ready(function () {
        renderRowsPerPageSelect();
        loadBrands();
    });

    /* Create Brand Section */
    $(document).on("submit", "#addBrandForm", function (e) {
    e.preventDefault();

    let formData = new FormData(this);

    $.ajax({
        url: "/admin/brand/create",
        type: "POST",
        data: formData,
        processData: false,
        contentType: false,

        success: function (res) {

            if (res.status) {

                Swal.fire({
                    icon: "success",
                    title: "Success",
                    text: res.message,
                    timer: 2000,
                    showConfirmButton: false
                });

                $("#addBrandModal").modal("hide");
                $("#addBrandForm")[0].reset();

                // Brand List Reload
                loadBrands();

            } else {

                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: res.message,
                    timer: 2000,
                    showConfirmButton: false
                });

            }

        },

        error: function (xhr) {

            Swal.fire({
                icon: "error",
                title: "Error",
                text: xhr.responseJSON?.detail || "Something went wrong.",
                timer: 2000,
                showConfirmButton: false
            });

        }
    });
});

    /* List Brand Section */

    let currentPage = 1;
    let currentSearch = "";
    let currentStatus = "";
    let rowsPerPage = 10;
    const rowsPerPageOptions = [5, 10, 15, 20];

    function loadBrands() {

   $.ajax({

    url: "/admin/aisetting/list",

    type: "GET",

    success: function(res){

        if(!res.status){

            Swal.fire({
                icon:"error",
                title:"Error",
                text:res.message
            });

            return;
        }

        let item = res.data;

        $(`input[name="provider"][value="${item.provider}"]`).prop("checked", true);
        /*$("#model").val(item.model);*/
        loadModels(item.provider, item.model);
        $("#temperature").val(item.temperature);
        $("#top_p").val(item.top_p);
        $("#max_output_tokens").val(item.max_output_tokens);
        $("#language").val(String(item.language));
        $("#description_length").val(String(item.description_length));
        $("#generate_seo").val(String(item.generate_seo));
        $("#generate_tags").val(String(item.generate_tags));
        $("#generate_specifications").val(String(item.generate_specifications));
        $("#system_prompt").val(item.system_prompt);
        $("#statuss").val(String(item.status));

    },

    error:function(){

        Swal.fire({
            icon:"error",
            title:"Error",
            text:"Unable to load AI settings."
        });

    }

});

}


    /* Pagination Area */

function renderPagination(total, page, limit){

    let pages = Math.ceil(total / limit);
    let html = "";

    if(pages <= 1){
        $(".pagination-area").html("");
        return;
    }

    html += `<nav><ul class="pagination justify-content-end">`;

    for(let i = 1; i <= pages; i++){

        html += `
            <li class="page-item ${i == page ? 'active' : ''}">
                <a href="#" class="page-link pagination-btn" data-page="${i}">
                    ${i}
                </a>
            </li>
        `;
    }

    html += `</ul></nav>`;

    $(".pagination-area").html(html);
}

function renderRowsPerPageSelect(){

    let html = "";

    rowsPerPageOptions.forEach(val => {

        html += `
            <option value="${val}" ${val == rowsPerPage ? "selected" : ""}>
                ${val}
            </option>
        `;

    });

    $("[data-table-set-rows-per-page]").html(html);

}

$(document).on("click", ".pagination-btn", function (e) {

    e.preventDefault();

    currentPage = $(this).data("page");

    loadBrands();

});

$(document).on("change", "[data-table-set-rows-per-page]", function () {

    rowsPerPage = parseInt($(this).val());

    currentPage = 1;

    loadBrands();

});

$(document).on("keyup", "[data-table-search]", function () {

    currentSearch = $(this).val().trim();

    currentPage = 1;

    loadBrands();

});

$(document).on("change", "[data-table-filter='status']", function () {

    currentStatus = $(this).val();

    currentPage = 1;

    loadBrands();

});

/*DELETE*/
let selectedIds = [];
function toggleBulkDeleteButton(){

    let btn = $("[data-table-delete-selected]");

    if(selectedIds.length > 0){
        btn.removeClass("d-none");
        btn.text(`Delete (${selectedIds.length})`);
    } else {
        btn.addClass("d-none");
        btn.text("Delete");
    }
}

$(document).on("change", ".product-item-check", function(){
   
    let id = $(this).val();

    if(!id){
        console.log("Missing ID in checkbox");
        return;
    }

    if($(this).is(":checked")){

        if(!selectedIds.includes(id)){
            selectedIds.push(id);
        }

    } else {

        selectedIds = selectedIds.filter(i => i != id);
    }

    console.log("Selected IDs:", selectedIds);

    toggleBulkDeleteButton();
});

$(document).on("change", "[data-table-select-all]", function(){
    let checked = $(this).is(":checked");
    // reset array
    selectedIds = [];
    $(".product-item-check").each(function(){
        $(this).prop("checked", checked);
        let id = $(this).val();
        if(checked && id){
            selectedIds.push(id);
        }
    });
    console.log("Select All:", selectedIds);
    toggleBulkDeleteButton();
});

$(document).on("click", "[data-table-delete-selected]", function(){

    if(selectedIds.length === 0){
        Swal.fire({
            icon: "warning",
            title: "No selection",
            text: "Please select at least one item"
        });
        return;
    }

    Swal.fire({
        icon: "warning",
        title: "Are you sure?",
        text: `${selectedIds.length} items will be deleted`,
        showCancelButton: true,
        confirmButtonText: "Yes, delete",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if(result.isConfirmed){

            $.ajax({
                url: "/admin/brand/bulk-delete",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    ids: selectedIds
                }),

                success: function(res){

                    if(res.status){

                        Swal.fire({
                            icon: "success",
                            title: "Deleted!",
                            text: res.message,
                            timer: 1500,
                            showConfirmButton: false
                        });

                        //  RESET STATE
                        selectedIds = [];

                        // uncheck all checkboxes
                        $(".product-item-check").prop("checked", false);
                        $("[data-table-select-all]").prop("checked", false);

                        // hide button
                        $("[data-table-delete-selected]").addClass("d-none");
                        $("[data-table-delete-selected]").text("Delete");

                        // reload table
                        loadBrands();
                    }
                },

                error: function(){

                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: "Something went wrong"
                    });

                }
            });
        }
    });

});

/* Single Row Delete */

$(document).on("click", ".delete-brand", function (e) {
    e.preventDefault();

    const id = $(this).data("id");

    Swal.fire({
        icon: "warning",
        title: "Are you sure?",
        text: "This brand will be deleted.",
        showCancelButton: true,
        confirmButtonText: "Yes, Delete",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if (result.isConfirmed) {

            $.ajax({
                url: `/admin/brand/delete/${id}`, // ya jo tumhara route hai
                type: "DELETE",                   // ya POST

                success: function (res) {

                    if (res.status) {

                        Swal.fire({
                            icon: "success",
                            title: "Deleted!",
                            text: res.message,
                            timer: 1500,
                            showConfirmButton: false
                        });

                        loadBrands(); // Table reload
                    }

                },

                error: function () {

                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: "Something went wrong."
                    });

                }

            });

        }

    });

});

$("#providerList").html(html);

/* Model */

const models = {
    gemini: [
        "gemini-3.5-flash",
        "gemini-3.5-pro"
    ],

    openai: [
        "gpt-5.5",
        "gpt-5"
    ],

    claude: [
        "claude-sonnet-4",
        "claude-opus-4"
    ],

    grok: [
        "grok-4"
    ]
};

function loadModels(provider, selectedModel = "") {

    let html = "";

    if (models[provider]) {

        models[provider].forEach(function(model){

            html += `
                <option value="${model}"
                    ${selectedModel === model ? "selected" : ""}>
                    ${model}
                </option>
            `;

        });

    }

    $("#model").html(html);

}

$(document).on("change", "input[name='provider']", function () {

    loadModels($(this).val());

});

/* Save Section */

function toggleSettingButton(isLoading) {

    $("#updateAISettingBtn").prop("disabled", isLoading);

    if (isLoading) {

        $("#updateAISettingBtn").html(`
            <span class="spinner-border spinner-border-sm me-2"></span>
            Saving...
        `);

    } else {

        $("#updateAISettingBtn").html(`
            <i class="ri-save-line me-1"></i>
            Save AI Settings
        `);

    }

}

$("#updateAISettingBtn").click(function () {

    toggleSettingButton(true);

    $.ajax({

        url: "/admin/aisetting/update",

        type: "POST",

        data: {

            provider: $('input[name="provider"]:checked').val(),

            model: $("#model").val(),

            temperature: $("#temperature").val(),

            top_p: $("#top_p").val(),

            max_output_tokens: $("#max_output_tokens").val(),

            language: $("#language").val(),

            description_length: $("#description_length").val(),

            generate_seo: $("#generate_seo").val(),

            generate_tags: $("#generate_tags").val(),

            generate_specifications: $("#generate_specifications").val(),

            system_prompt: $("#system_prompt").val(),

            status: $("#statuss").val()

        },

        success: function (response) {

            toggleSettingButton(false);

            if (!response.status) {

                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: response.message
                });

                return;
            }

            Swal.fire({
                icon: "success",
                title: "Success",
                text: response.message,
                timer: 2000,
                showConfirmButton: false
            });

        },

        error: function (xhr) {

            toggleSettingButton(false);

            let message = "Something went wrong.";

            if (xhr.responseJSON && xhr.responseJSON.message) {
                message = xhr.responseJSON.message;
            }

            Swal.fire({
                icon: "error",
                title: "Error",
                text: message
            });

        }

    });

});
