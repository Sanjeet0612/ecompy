<!doctype html>
<html lang="en">
        <meta charset="utf-8" />
        <title>Create New Account | Vendor</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Vendor." />
        <meta name="keywords" content="Vendor dashboard" />
        <meta name="author" content="Coderthemes" />

<!-- App favicon -->
<link rel="shortcut icon" href="/static/admin/assets/images/favicon.ico" />
 <!-- Theme Config Js -->
<script src="/static/admin/assets/js/config-html.js"></script>

<!-- Theme Config Js -->
<script src="/static/admin/assets/js/config.js"></script>

<!-- Vendor css -->
<link href="/static/admin/assets/css/vendors.min.css" rel="stylesheet" type="text/css" />

<!-- App css -->
<link id="app-style" href="/static/admin/assets/css/app.min.css" rel="stylesheet" type="text/css" />

    </head>

    <body>
        <div class="auth-box overflow-hidden align-items-center d-flex">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-xxl-4 col-md-6 col-sm-8">
                        <div class="card p-4">
                            <div class="position-absolute top-0 end-0" style="width: 180px">
                                <img src="/static/admin/assets/images/auth-card-bg.svg" class="auth-card-bg-img" alt="auth-card-bg" />
                            </div>
                            <div class="auth-brand text-center mb-4">
                                <a href="index.html" class="logo-dark">
                                    <img src="/static/admin/assets/images/logo-black.png" alt="dark logo" />
                                </a>
                                <a href="index.html" class="logo-light">
                                    <img src="/static/admin/assets/images/logo.png" alt="logo" />
                                </a>
                                <p class="text-muted w-lg-75 mt-3 mx-auto">Let’s get you started. Create your account by entering your details below.</p>
                                <div id="log-error" class="alert alert-danger d-none"></div>
                            </div>

                            <form id="vendorSignupForm">
                                <div class="mb-3">
                                    <label for="userName" class="form-label">
                                        Name
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="vendorName" name="vendorName" placeholder="Geneva K." required />
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="userEmail" class="form-label">
                                        Email address
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <input type="email" class="form-control" id="vendorEmail" name="vendorEmail" placeholder="you@example.com" required />
                                    </div>
                                </div>

                                <div class="mb-3" data-password="bar">
                                    <label for="userPassword" class="form-label">
                                        Password
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="vendorPassword" name="vendorPassword" placeholder="••••••••" required />
                                    </div>
                                    <div class="password-bar my-2"></div>
                                    <p class="text-muted fs-xs mb-0">Use 8+ characters with letters, numbers & symbols.</p>
                                </div>

                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input form-check-input-light fs-14" type="checkbox" id="termAndPolicy" />
                                        <label class="form-check-label" for="termAndPolicy">Agree the Terms & Policy</label>
                                    </div>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary fw-semibold py-2">Create Account</button>
                                </div>
                            </form>

                            <p class="text-muted text-center mt-4 mb-0">
                                Already have an account?
                                <a href="/vendor" class="text-decoration-underline link-offset-3 fw-semibold">Login</a>
                            </p>
                        </div>

                        <p class="text-center text-muted mt-4 mb-0">
                            ©
                            <span data-current-year></span>
                            UBold — by
                            <span class="fw-semibold">Coderthemes</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
        <!-- end auth-fluid-->
        <!-- Vendor js -->
        <script src="/static/admin/assets/js/vendors.min.js"></script>
        <!-- App js -->
        <script src="/static/admin/assets/js/app.js"></script>
        <!-- Password Suggestion Js -->
        <script src="/static/admin/assets/js/pages/auth-password.js"></script>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </body>
</html>


<script>
$("#vendorSignupForm").submit(function(e){

    e.preventDefault();

    $("#log-error").addClass("d-none").text("");

    $.ajax({
        url: "/vendor/api/signup",
        type: "POST",
        contentType: "application/json",

        data: JSON.stringify({
            name: $("#vendorName").val(), 
            email: $("#vendorEmail").val(),
            password: $("#vendorPassword").val()
        }),

        success: function(res){

            Swal.fire({
                icon: "success",
                title: "Registration Successful",
                html: `
                    <p>${res.message}</p>
                    <br>
                    <small>
                        <i class="fa fa-envelope text-primary"></i>
                        If you don't see the email, please check your Spam or Promotions folder.
                    </small>
                `,
                confirmButtonText: "OK"
            }).then(() => {

                // Optional
                // window.location.href = "/vendor/login";

            });

        },

        error: function(xhr){
            let message = "Something went wrong.";
            if(xhr.responseJSON && xhr.responseJSON.detail){
                message = xhr.responseJSON.detail;
            }
            Swal.fire({
                icon: "error",
                title: "Signup Failed",
                text: message
            });
        }

    });

});
</script>
