<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sign In | Vendor</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="UBold is a modern, responsive admin dashboard available on ThemeForest. Ideal for building CRM, CMS, project management tools, and custom web applications with a clean UI, flexible layouts, and rich features." />
<meta name="keywords" content="UBold, admin dashboard, ThemeForest, Bootstrap 5 admin, Tailwind CSS, responsive admin, CRM dashboard, CMS admin, web app UI, admin theme, premium admin template" />
<meta name="author" content="Coderthemes" />

<!-- App favicon -->
<link rel="shortcut icon" href="/static/admin/assets/images/favicon.ico" />
 <!-- Theme Config Js -->
<script src="/static/admin/assets/js/config-html.js"></script>

<!-- Theme Config Js -->
<script src="/static/admin/assets/js/config.js"></script>

<!-- Vendor css -->
<link href="/static/admin/assets/css/vendors.min.css" rel="stylesheet" type="text/css" />

<!-- App css -->
<link id="app-style" href="/static/admin/assets/css/app.min.css" rel="stylesheet" type="text/css" />

    </head>

    <body>
        <div class="auth-box overflow-hidden align-items-center d-flex">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-xxl-4 col-md-6 col-sm-8">
                        <div class="card p-4">
                            <div class="position-absolute top-0 end-0" style="width: 180px">
                                <img src="/static/admin/assets/images/auth-card-bg.svg" class="auth-card-bg-img" alt="auth-card-bg" />
                            </div>
                            <div class="auth-brand text-center mb-4">
                                <a href="index.html" class="logo-dark">
                                    <img src="/static/admin/assets/images/logo-black.png" alt="dark logo" />
                                </a>
                                <a href="index.html" class="logo-light">
                                    <img src="/static/admin/assets/images/logo.png" alt="logo" />
                                </a>
                                <p class="text-muted w-lg-75 mt-3 mx-auto">Let’s get you signed in. Enter your email and password to continue.</p>
                                <div id="log-error" class="alert alert-danger d-none"></div>
                                {% if flash_success %}
                                <script>
                                Swal.fire({
                                    icon: "success",
                                    title: "Success",
                                    text: "{{ flash_success }}"
                                });
                                </script>
                                {% endif %}
                            </div>
                            <form id="vendorLoginForm">
                                <div class="mb-3">
                                    <label for="vendorEmail" class="form-label">
                                        Email address
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <input type="email" class="form-control" id="vendorEmail" name="vendorEmail" placeholder="you@example.com" required />
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="vendorPassword" class="form-label">
                                        Password
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="vendorPassword" name="vendorPassword" placeholder="••••••••" required />
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input form-check-input-light fs-14" type="checkbox" checked id="rememberMe" />
                                        <label class="form-check-label" for="rememberMe">Keep me signed in</label>
                                    </div>
                                    <a href="auth-reset-pass.html" class="text-decoration-underline link-offset-3 text-muted">Forgot Password?</a>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary fw-semibold py-2">Sign In</button>
                                </div>
                            </form>

                            <p class="text-muted text-center mt-4 mb-0">
                                New here?
                                <a href="/vendor/sign-up" class="text-decoration-underline link-offset-3 fw-semibold">Create an account</a>
                            </p>
                        </div>

                        <p class="text-center text-muted mt-4 mb-0">
                            ©
                            <span data-current-year></span>
                            UBold — by
                            <span class="fw-semibold">Coderthemes</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- end auth-fluid-->
        <!-- Vendor js -->
        <script src="/static/admin/assets/js/vendors.min.js"></script>

        <!-- App js -->
        <script src="/static/admin/assets/js/app.js"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    </body>
</html>


<script>
$("#vendorLoginForm").submit(function(e){

    e.preventDefault();

    $("#log-error").addClass("d-none").text("");

    $.ajax({
        url: "/vendor/api/login",
        type: "POST",
        contentType: "application/json",

        data: JSON.stringify({
            email: $("#vendorEmail").val(),
            password: $("#vendorPassword").val()
        }),

        success: function(res){

            if(res.status){

                Swal.fire({
                    icon: "success",
                    title: "Login Successful",
                    text: res.message,
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {

                    // JWT token save (if backend returns it)
                    if(res.access_token){
                        localStorage.setItem("vendor_token", res.access_token);
                    }

                    window.location.href = "/vendor/dashboard";

                });

            }else{

                Swal.fire({
                    icon: "error",
                    title: "Login Failed",
                    text: res.message
                });

            }

        },

        error: function(xhr){

            let message = "Something went wrong.";

            if(xhr.responseJSON){

                if(xhr.responseJSON.message){
                    message = xhr.responseJSON.message;
                }else if(xhr.responseJSON.detail){
                    message = xhr.responseJSON.detail;
                }

            }

            Swal.fire({
                icon: "error",
                title: "Login Failed",
                text: message
            });

        }

    });

});
</script>
